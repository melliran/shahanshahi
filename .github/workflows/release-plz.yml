# https://release-plz.dev/docs/github/quickstart
# — release-pr: opens/updates a draft PR (version bump + CHANGELOG).
# — release: publishes to crates.io + GitHub Release only when explicitly enabled (repo variable).
#
# If you see: "GitHub Actions is not permitted to create or approve pull requests":
# enable repo setting (see docs/ENGINEERING.md) or set secret RELEASE_PLZ_GITHUB_TOKEN (PAT).

name: release-plz

on:
  push:
    branches:
      - main

jobs:
  release-plz-pr:
    name: Release PR (version + changelog)
    if: github.repository == 'melliran/shahanshahi'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5.128
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_GITHUB_TOKEN != '' && secrets.RELEASE_PLZ_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

  release-plz-release:
    name: Publish (crates.io + GitHub Release)
    if: >
      github.repository == 'melliran/shahanshahi' &&
      vars.RELEASE_PLZ_PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5.128
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_GITHUB_TOKEN != '' && secrets.RELEASE_PLZ_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
