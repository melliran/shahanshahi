# cargo-deny: https://embarkstudios.github.io/cargo-deny/
# Aligns with dual licensing (MIT OR Apache-2.0) and RustSec advisories.

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
